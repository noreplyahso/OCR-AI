name: ci-cd-release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump_level:
        description: "Version bump level for a manual run"
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Mark the manual release as a prerelease"
        required: false
        default: false
        type: boolean
      make_latest:
        description: "Mark the manual release as Latest"
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Syntax check Python entry points
        shell: pwsh
        run: |
          python -m compileall -q main.py Runtime_Software.py test_SLMP.py lib

  build-release:
    name: Build and publish release
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    needs: ci
    runs-on: windows-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          git fetch --force --tags

          $existingTagsForCommit = @(
            git tag --points-at $env:GITHUB_SHA |
              Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } |
              Sort-Object {
                $version = $_.Substring(1).Split('.')
                [int]$version[0] * 1000000 + [int]$version[1] * 1000 + [int]$version[2]
              }
          )

          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $bumpLevel = '${{ inputs.bump_level }}'
            $prerelease = '${{ inputs.prerelease }}'
            $makeLatest = '${{ inputs.make_latest }}'
          } else {
            $bumpLevel = 'patch'
            $prerelease = 'false'
            $makeLatest = 'true'
          }

          if ($existingTagsForCommit.Count -gt 0) {
            $tag = $existingTagsForCommit[-1]
            $createdTag = 'false'
          } else {
            $allTags = @(
              git tag --list 'v*' |
                Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } |
                Sort-Object {
                  $version = $_.Substring(1).Split('.')
                  [int]$version[0] * 1000000 + [int]$version[1] * 1000 + [int]$version[2]
                }
            )

            if ($allTags.Count -eq 0) {
              $major = 0
              $minor = 1
              $patch = 0
            } else {
              $latest = $allTags[-1].Substring(1).Split('.')
              $major = [int]$latest[0]
              $minor = [int]$latest[1]
              $patch = [int]$latest[2]

              switch ($bumpLevel) {
                'major' {
                  $major += 1
                  $minor = 0
                  $patch = 0
                }
                'minor' {
                  $minor += 1
                  $patch = 0
                }
                default {
                  $patch += 1
                }
              }
            }

            $tag = "v$major.$minor.$patch"
            $createdTag = 'true'
          }

          $name = "DRB-OCR-AI $tag"
          $appVersion = $tag.TrimStart('v')

          "release_tag=$tag" >> $env:GITHUB_OUTPUT
          "release_name=$name" >> $env:GITHUB_OUTPUT
          "app_version=$appVersion" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          "make_latest=$makeLatest" >> $env:GITHUB_OUTPUT
          "created_tag=$createdTag" >> $env:GITHUB_OUTPUT

      - name: Create and push release tag
        if: steps.meta.outputs.created_tag == 'true'
        shell: pwsh
        run: |
          git tag ${{ steps.meta.outputs.release_tag }} $env:GITHUB_SHA
          git push origin ${{ steps.meta.outputs.release_tag }}

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --extra-index-url https://download.pytorch.org/whl/cu117 -r requirements.txt
          python -m pip install pyinstaller==6.16.0 pyinstaller-hooks-contrib==2025.8 pymcprotocol pywin32 PyYAML==6.0.2
          python -c "import PyInstaller, yaml; print(PyInstaller.__version__); print(yaml.__file__)"

      - name: Build Windows bundle with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --clean `
            --noconfirm `
            --onedir `
            --console `
            --name DRB-OCR-AI `
            --collect-submodules torch `
            --collect-submodules torchvision `
            --collect-submodules torchinfo `
            --collect-submodules sklearn `
            --collect-submodules ultralytics `
            --collect-submodules cvzone `
            --collect-submodules pypylon `
            --collect-submodules PIL `
            --collect-submodules yaml `
            --hidden-import cProfile `
            --hidden-import logging `
            --hidden-import logging.handlers `
            --hidden-import pathlib `
            --hidden-import platform `
            --hidden-import threading `
            --hidden-import yaml `
            --hidden-import importlib.resources `
            --hidden-import pyqtgraph `
            --exclude-module onnx `
            --exclude-module onnxruntime `
            --exclude-module transformers `
            --exclude-module tensorrt `
            --exclude-module cupy `
            main.py

      - name: Copy runtime assets into distribution
        id: package
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD 'dist\DRB-OCR-AI'
          if (-not (Test-Path $releaseDir)) {
            throw "Missing PyInstaller output directory: $releaseDir"
          }

          $runtimeDirs = @(
            'form_UI',
            'Icon',
            'RunTime_Sofware',
            'module'
          )

          foreach ($dir in $runtimeDirs) {
            if (Test-Path $dir) {
              Copy-Item $dir -Destination $releaseDir -Recurse -Force
            }
          }

          $libTarget = Join-Path $releaseDir 'lib'
          New-Item -ItemType Directory -Path $libTarget -Force | Out-Null

          Get-ChildItem 'lib' -File |
            Where-Object { $_.Extension -in '.py', '.dll', '.txt' -and $_.Name -ne 'setup.py' } |
            Copy-Item -Destination $libTarget -Force

          Get-ChildItem -File -Filter '*.pt' |
            Copy-Item -Destination $releaseDir -Force

          $optionalFiles = @(
            'README.md',
            'DRB_Metalcore_text.sql',
            'DRB product text.xlsx'
          )

          foreach ($file in $optionalFiles) {
            if (Test-Path $file) {
              Copy-Item $file -Destination $releaseDir -Force
            }
          }

          if (Test-Path 'OCR_DeepLearning_Software') {
            Copy-Item 'OCR_DeepLearning_Software' -Destination $releaseDir -Recurse -Force
          }

          $manifest = @(
            'Packaged by GitHub Actions'
            "Tag: ${{ steps.meta.outputs.release_tag }}"
            "Commit: $env:GITHUB_SHA"
            'Included runtime directories: form_UI, Icon, RunTime_Sofware, module, lib'
            'Optional runtime files are copied only when present in the repository checkout.'
          )
          Set-Content -Path (Join-Path $releaseDir 'release-manifest.txt') -Value $manifest

          $assetDir = Join-Path $PWD 'dist\release'
          New-Item -ItemType Directory -Path $assetDir -Force | Out-Null

          $zipName = "DRB-OCR-AI-${{ steps.meta.outputs.release_tag }}-windows-x64.zip"
          $zipPath = Join-Path $assetDir $zipName
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path $releaseDir -DestinationPath $zipPath -Force

          $checksumPath = "$zipPath.sha256"
          $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path $checksumPath -Value "$hash  $zipName" -NoNewline

          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          "zip_checksum_path=$checksumPath" >> $env:GITHUB_OUTPUT

      - name: Smoke test packaged executable
        shell: pwsh
        run: |
          $env:DRB_OCR_AI_SMOKE_TEST = '1'
          $exePath = "$PWD\dist\DRB-OCR-AI\DRB-OCR-AI.exe"
          $stdoutPath = Join-Path $env:RUNNER_TEMP 'drb-smoke-test.stdout.log'
          $stderrPath = Join-Path $env:RUNNER_TEMP 'drb-smoke-test.stderr.log'
          $appLogPath = Join-Path $env:LOCALAPPDATA 'DRB-OCR-AI\logs\app.log'
          $crashLogPath = Join-Path $env:LOCALAPPDATA 'DRB-OCR-AI\logs\crash.log'

          function Show-SmokeTestDiagnostics {
            if (Test-Path $stdoutPath) {
              Write-Host '=== Smoke test stdout ==='
              Get-Content $stdoutPath
            }
            if (Test-Path $stderrPath) {
              Write-Host '=== Smoke test stderr ==='
              Get-Content $stderrPath
            }
            if (Test-Path $appLogPath) {
              Write-Host '=== App log ==='
              Get-Content $appLogPath
            }
            if (Test-Path $crashLogPath) {
              Write-Host '=== Crash log ==='
              Get-Content $crashLogPath
            }
          }

          if (Test-Path $stdoutPath) {
            Remove-Item $stdoutPath -Force
          }
          if (Test-Path $stderrPath) {
            Remove-Item $stderrPath -Force
          }

          $process = Start-Process `
            -FilePath $exePath `
            -NoNewWindow `
            -PassThru `
            -RedirectStandardOutput $stdoutPath `
            -RedirectStandardError $stderrPath

          if (-not $process.WaitForExit(120000)) {
            try {
              $process.Kill($true)
            } catch {
            }
            Show-SmokeTestDiagnostics
            throw "Packaged executable smoke test timed out after 120 seconds"
          }

          if ($process.ExitCode -ne 0) {
            Show-SmokeTestDiagnostics
            throw "Packaged executable smoke test failed with exit code $($process.ExitCode)"
          }

      - name: Resolve Inno Setup compiler
        id: innosetup
        shell: pwsh
        run: |
          function Find-Iscc {
            $command = Get-Command iscc.exe -ErrorAction SilentlyContinue
            if ($command) {
              return $command.Source
            }

            $candidates = @(
              "$env:ProgramFiles(x86)\Inno Setup 6\ISCC.exe",
              "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
            )

            foreach ($candidate in $candidates) {
              if (Test-Path $candidate) {
                return $candidate
              }
            }

            $registryKeys = @(
              'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\Inno Setup 6_is1',
              'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\Inno Setup 6_is1'
            )

            foreach ($key in $registryKeys) {
              if (-not (Test-Path $key)) {
                continue
              }

              $installLocation = (Get-ItemProperty -Path $key -ErrorAction SilentlyContinue).InstallLocation
              if (-not $installLocation) {
                continue
              }

              $candidate = Join-Path $installLocation 'ISCC.exe'
              if (Test-Path $candidate) {
                return $candidate
              }
            }

            return $null
          }

          $iscc = Find-Iscc
          if (-not $iscc) {
            choco upgrade innosetup --no-progress -y
            $iscc = Find-Iscc
          }

          if (-not $iscc) {
            throw "ISCC.exe not found after resolving Inno Setup."
          }

          $isccDir = Split-Path $iscc -Parent
          $isccDir >> $env:GITHUB_PATH
          "iscc_path=$iscc" >> $env:GITHUB_OUTPUT
          Write-Host "Using Inno Setup compiler at $iscc"

      - name: Build installer with Inno Setup
        id: installer
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD 'dist\DRB-OCR-AI'
          $installerDir = Join-Path $PWD 'dist\installer'
          New-Item -ItemType Directory -Path $installerDir -Force | Out-Null

          $outputBase = "DRB-OCR-AI-${{ steps.meta.outputs.release_tag }}-setup-x64"
          $iscc = '${{ steps.innosetup.outputs.iscc_path }}'

          if (-not $iscc) {
            throw "ISCC.exe not found."
          }

          & $iscc `
            "/DAppVersion=${{ steps.meta.outputs.app_version }}" `
            "/DSourceDir=$releaseDir" `
            "/DRepoRoot=$PWD" `
            "/DOutputDir=$installerDir" `
            "/DOutputBaseFilename=$outputBase" `
            "installer\DRB-OCR-AI.iss"

          $installerPath = Join-Path $installerDir "$outputBase.exe"
          if (-not (Test-Path $installerPath)) {
            throw "Missing generated installer: $installerPath"
          }

          $installerChecksumPath = "$installerPath.sha256"
          $hash = (Get-FileHash -Path $installerPath -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path $installerChecksumPath -Value "$hash  $(Split-Path $installerPath -Leaf)" -NoNewline

          "installer_path=$installerPath" >> $env:GITHUB_OUTPUT
          "installer_checksum_path=$installerChecksumPath" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: drb-ocr-ai-${{ steps.meta.outputs.release_tag }}-windows-x64
          path: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.zip_checksum_path }}
            ${{ steps.installer.outputs.installer_path }}
            ${{ steps.installer.outputs.installer_checksum_path }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
          MAKE_LATEST: ${{ steps.meta.outputs.make_latest }}
          ZIP_PATH: ${{ steps.package.outputs.zip_path }}
          ZIP_CHECKSUM_PATH: ${{ steps.package.outputs.zip_checksum_path }}
          INSTALLER_PATH: ${{ steps.installer.outputs.installer_path }}
          INSTALLER_CHECKSUM_PATH: ${{ steps.installer.outputs.installer_checksum_path }}
        run: |
          gh release view $env:RELEASE_TAG *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          if ($releaseExists) {
            $editArgs = @(
              'release', 'edit', $env:RELEASE_TAG,
              '--title', $env:RELEASE_NAME,
              '--target', $env:GITHUB_SHA
            )

            if ($env:PRERELEASE -eq 'true') {
              $editArgs += '--prerelease'
            }

            if ($env:MAKE_LATEST -eq 'true') {
              $editArgs += '--latest'
            }

            & gh @editArgs
            gh release upload $env:RELEASE_TAG $env:ZIP_PATH $env:ZIP_CHECKSUM_PATH $env:INSTALLER_PATH $env:INSTALLER_CHECKSUM_PATH --clobber
          } else {
            $createArgs = @(
              'release', 'create', $env:RELEASE_TAG,
              $env:ZIP_PATH,
              $env:ZIP_CHECKSUM_PATH,
              $env:INSTALLER_PATH,
              $env:INSTALLER_CHECKSUM_PATH,
              '--title', $env:RELEASE_NAME,
              '--generate-notes',
              '--target', $env:GITHUB_SHA
            )

            if ($env:PRERELEASE -eq 'true') {
              $createArgs += '--prerelease'
            }

            if ($env:MAKE_LATEST -eq 'true') {
              $createArgs += '--latest'
            } else {
              $createArgs += '--latest=false'
            }

            & gh @createArgs
          }
