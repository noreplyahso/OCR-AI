# Required GitHub secrets:
#   GH_RELEASE_TOKEN
#     Optional personal access token with `contents:write`. When omitted, the workflow falls back to the built-in `github.token`.
#   FAILURE_WEBHOOK_URL
#     Optional Slack-compatible webhook URL used by `if: failure()` notification steps.
#
# Required GitHub environments:
#   staging
#     Used for prerelease publication.
#   production
#     Configure required reviewers here to create the manual approval gate before production promotion.
# TODO: Add required reviewers to the `production` environment in GitHub settings.
#
# Deployment model:
#   Rolling promotion with immutable artifacts.
#   The workflow validates the exact build on staging first, then promotes the same installer to production.
#   The portable ZIP remains an internal Actions artifact for QA and debugging, not a public release asset.
#   The previous stable release remains available until the production health check succeeds.
#
# Manual rollback strategy:
#   Run this workflow manually with `rollback_tag` set to a previously validated production tag such as `v1.2.2`.
#   The workflow will re-promote that existing release as `latest` without rebuilding artifacts.

name: ci-cd-release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Semver tag to build and deploy, for example v1.2.3"
        required: false
        type: string
      rollback_tag:
        description: "Existing stable release tag to re-promote, for example v1.2.2"
        required: false
        type: string

permissions:
  contents: write

env:
  APP_NAME: DRB-OCR-AI
  PYTHON_VERSION: "3.9"
  PYTHONUTF8: "1"
  PIP_EXTRA_INDEX_URL: "https://download.pytorch.org/whl/cu117"
  GITHUB_RELEASE_ASSET_MAX_BYTES: "2147483647"
  FAILURE_WEBHOOK_URL: ${{ secrets.FAILURE_WEBHOOK_URL }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-release:
    name: Resolve Release Metadata
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 10
    outputs:
      deploy_mode: ${{ steps.resolve.outputs.deploy_mode }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_name: ${{ steps.resolve.outputs.release_name }}
      staging_tag: ${{ steps.resolve.outputs.staging_tag }}
      app_version: ${{ steps.resolve.outputs.app_version }}

    steps:
      - name: Resolve release mode and tags
        id: resolve
        shell: pwsh
        continue-on-error: false
        run: |
          $eventName = '${{ github.event_name }}'
          $releaseVersion = '${{ github.event.inputs.release_version }}'
          $rollbackTag = '${{ github.event.inputs.rollback_tag }}'

          if ($eventName -eq 'push' -and '${{ github.ref_type }}' -eq 'tag') {
            $deployMode = 'release'
            $releaseTag = '${{ github.ref_name }}'
          } elseif ($eventName -eq 'workflow_dispatch' -and -not [string]::IsNullOrWhiteSpace($rollbackTag)) {
            $deployMode = 'rollback'
            $releaseTag = $rollbackTag
          } elseif ($eventName -eq 'workflow_dispatch' -and -not [string]::IsNullOrWhiteSpace($releaseVersion)) {
            $deployMode = 'release'
            $releaseTag = $releaseVersion
          } else {
            throw "Provide `release_version` for a normal deployment or `rollback_tag` for rollback."
          }

          if ($releaseTag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must follow semver format, for example v1.2.3."
          }

          $releaseName = "${env:APP_NAME} $releaseTag"
          $stagingTag = "staging-$releaseTag"
          $appVersion = $releaseTag.TrimStart('v')

          "deploy_mode=$deployMode" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "staging_tag=$stagingTag" >> $env:GITHUB_OUTPUT
          "app_version=$appVersion" >> $env:GITHUB_OUTPUT

      - name: Notify failure
        if: failure() && env.FAILURE_WEBHOOK_URL != ''
        shell: pwsh
        continue-on-error: false
        run: |
          # TODO: Adjust the JSON payload if your chat system is not Slack-compatible.
          $payload = @{
            text = "GitHub Actions failure: resolve-release job failed for $env:GITHUB_REPOSITORY on run $env:GITHUB_RUN_ID."
          } | ConvertTo-Json -Compress
          Invoke-RestMethod -Method Post -Uri $env:FAILURE_WEBHOOK_URL -ContentType 'application/json' -Body $payload

  lint-and-test:
    name: Lint And Unit Test
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.rollback_tag == ''
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: ${{ github.workspace }};${{ github.workspace }}\lib

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt

      - name: Install dev dependencies
        shell: pwsh
        continue-on-error: false
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements-dev.txt

      - name: Run flake8 lint
        shell: pwsh
        continue-on-error: false
        run: |
          flake8 main.py lib\AppLogger.py tests

      - name: Run unit tests with coverage
        shell: pwsh
        continue-on-error: false
        run: |
          New-Item -ItemType Directory -Path test-results -Force | Out-Null
          pytest tests `
            --maxfail=1 `
            --disable-warnings `
            --junitxml=test-results\junit.xml `
            --cov=AppLogger `
            --cov-report=xml:test-results\coverage.xml `
            --cov-report=html:test-results\htmlcov

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: |
            test-results
          if-no-files-found: warn

      - name: Notify failure
        if: failure() && env.FAILURE_WEBHOOK_URL != ''
        shell: pwsh
        continue-on-error: false
        run: |
          # TODO: Adjust the JSON payload if your chat system is not Slack-compatible.
          $payload = @{
            text = "GitHub Actions failure: lint-and-test job failed for $env:GITHUB_REPOSITORY on run $env:GITHUB_RUN_ID."
          } | ConvertTo-Json -Compress
          Invoke-RestMethod -Method Post -Uri $env:FAILURE_WEBHOOK_URL -ContentType 'application/json' -Body $payload

  build-package:
    name: Build Windows Package
    if: needs.resolve-release.outputs.deploy_mode == 'release'
    needs:
      - resolve-release
      - lint-and-test
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      BUILD_ROOT: ${{ github.workspace }}\dist
      RELEASE_ROOT: ${{ github.workspace }}\dist\release
      LOCAL_SMOKE_LOG_DIR: ${{ github.workspace }}\build-logs

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt

      - name: Install production and build dependencies
        shell: pwsh
        continue-on-error: false
        run: |
          $ErrorActionPreference = 'Stop'

          function Invoke-CheckedPython {
            param(
              [Parameter(Mandatory = $true)]
              [string[]] $Arguments
            )

            & python @Arguments
            if ($LASTEXITCODE -ne 0) {
              throw "Command failed: python $($Arguments -join ' ')"
            }
          }

          Invoke-CheckedPython -Arguments @('-m', 'pip', 'install', '--upgrade', 'pip', 'setuptools', 'wheel')
          Invoke-CheckedPython -Arguments @('-m', 'pip', 'install', '--extra-index-url', $env:PIP_EXTRA_INDEX_URL, '-r', 'requirements.txt')
          Invoke-CheckedPython -Arguments @(
            '-m', 'pip', 'install', '--prefer-binary', '--extra-index-url', $env:PIP_EXTRA_INDEX_URL,
            'torch==2.0.1+cu117',
            'torchvision==0.15.2+cu117',
            'torchaudio==2.0.2+cu117',
            'ultralytics==8.3.176',
            'ultralytics-thop==2.0.15',
            'cvzone==1.6.1',
            'opencv-python==4.10.0.84',
            'pypylon==4.2.0',
            'PyYAML==6.0.2',
            'psutil==7.0.0',
            'pandas==2.1.4',
            'numpy==1.26.4',
            'scikit-learn==1.3.2',
            'pymodbus==3.8.6',
            'PyMySQL==1.1.1',
            'pyqtgraph==0.13.7',
            'tqdm==4.67.1',
            'openpyxl==3.1.5'
          )
          Invoke-CheckedPython -Arguments @(
            '-m', 'pip', 'install',
            'pyinstaller==6.16.0',
            'pyinstaller-hooks-contrib==2025.8',
            'pymcprotocol==0.3.0',
            'pywin32==311'
          )
          Invoke-CheckedPython -Arguments @('-m', 'pip', 'show', 'torch', 'torchvision', 'torchaudio', 'ultralytics', 'opencv-python', 'pypylon')
          Invoke-CheckedPython -Arguments @('-c', 'import torch, torchvision, torchaudio, ultralytics, cv2, cvzone, pypylon, yaml, psutil, PyInstaller; print(torch.__version__)')

      - name: Resolve release file names
        id: names
        shell: pwsh
        continue-on-error: false
        run: |
          $releaseTag = '${{ needs.resolve-release.outputs.release_tag }}'
          $zipName = "$env:APP_NAME-$releaseTag-windows-x64.zip"
          $installerName = "$env:APP_NAME-$releaseTag-setup-x64.exe"
          $installerBaseName = [System.IO.Path]::GetFileNameWithoutExtension($installerName)
          "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          "installer_name=$installerName" >> $env:GITHUB_OUTPUT
          "installer_base_name=$installerBaseName" >> $env:GITHUB_OUTPUT

      - name: Build PyInstaller bundle
        shell: pwsh
        continue-on-error: false
        run: |
          python -m pip install --upgrade setuptools==80.9.0
          python -c "import PyInstaller, pkg_resources, setuptools; print(PyInstaller.__version__); print(setuptools.__version__)"
          if (Test-Path build) {
            Remove-Item build -Recurse -Force
          }
          if (Test-Path dist) {
            Remove-Item dist -Recurse -Force
          }
          pyinstaller --clean --noconfirm main.spec

      - name: Copy runtime assets
        shell: pwsh
        continue-on-error: false
        run: |
          $releaseDir = Join-Path $env:BUILD_ROOT $env:APP_NAME
          $runtimeDirs = @('form_UI', 'Icon', 'RunTime_Sofware', 'module')

          New-Item -ItemType Directory -Path $env:RELEASE_ROOT -Force | Out-Null

          foreach ($dir in $runtimeDirs) {
            if (Test-Path $dir) {
              Copy-Item $dir -Destination $releaseDir -Recurse -Force
            }
          }

          $libTarget = Join-Path $releaseDir 'lib'
          New-Item -ItemType Directory -Path $libTarget -Force | Out-Null

          Get-ChildItem lib -File |
            Where-Object { $_.Extension -in '.py', '.dll', '.txt' -and $_.Name -ne 'setup.py' } |
            Copy-Item -Destination $libTarget -Force

          Get-ChildItem -File -Filter '*.pt' |
            Copy-Item -Destination $releaseDir -Force

          foreach ($file in @('README.md', 'DRB_Metalcore_text.sql', 'DRB product text.xlsx')) {
            if (Test-Path $file) {
              Copy-Item $file -Destination $releaseDir -Force
            }
          }

      - name: Run pre-deploy smoke test
        shell: pwsh
        continue-on-error: false
        env:
          DRB_OCR_AI_SMOKE_TEST: "1"
        run: |
          $releaseDir = Join-Path $env:BUILD_ROOT $env:APP_NAME
          $exePath = Join-Path $releaseDir "$env:APP_NAME.exe"
          $stdoutPath = Join-Path $env:LOCAL_SMOKE_LOG_DIR 'build-smoke.stdout.log'
          $stderrPath = Join-Path $env:LOCAL_SMOKE_LOG_DIR 'build-smoke.stderr.log'

          New-Item -ItemType Directory -Path $env:LOCAL_SMOKE_LOG_DIR -Force | Out-Null
          if (Test-Path $stdoutPath) { Remove-Item $stdoutPath -Force }
          if (Test-Path $stderrPath) { Remove-Item $stderrPath -Force }

          $process = Start-Process `
            -FilePath $exePath `
            -WorkingDirectory $releaseDir `
            -NoNewWindow `
            -PassThru `
            -RedirectStandardOutput $stdoutPath `
            -RedirectStandardError $stderrPath

          if (-not $process.WaitForExit(120000)) {
            try { $process.Kill($true) } catch {}
            throw "Smoke test timed out after 120 seconds."
          }

          if ($process.ExitCode -ne 0) {
            if (Test-Path $stdoutPath) { Get-Content $stdoutPath }
            if (Test-Path $stderrPath) { Get-Content $stderrPath }
            throw "Smoke test failed with exit code $($process.ExitCode)."
          }

      - name: Build portable archive
        shell: pwsh
        continue-on-error: false
        run: |
          $releaseDir = Join-Path $env:BUILD_ROOT $env:APP_NAME
          $zipPath = Join-Path $env:RELEASE_ROOT '${{ steps.names.outputs.zip_name }}'
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path $releaseDir -DestinationPath $zipPath -Force

      - name: Resolve Inno Setup compiler
        id: innosetup
        shell: pwsh
        continue-on-error: false
        run: |
          function Resolve-IsccPath {
            $command = Get-Command iscc.exe -ErrorAction SilentlyContinue
            if ($command) {
              return $command.Source
            }

            $isccCandidates = @(
              "$env:ProgramFiles(x86)\Inno Setup 6\ISCC.exe",
              "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
            )

            foreach ($candidate in $isccCandidates) {
              if (Test-Path $candidate) {
                return $candidate
              }
            }

            $registryKeys = @(
              'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\Inno Setup 6_is1',
              'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\Inno Setup 6_is1'
            )

            foreach ($key in $registryKeys) {
              if (-not (Test-Path $key)) {
                continue
              }

              $installLocation = (Get-ItemProperty -Path $key -ErrorAction SilentlyContinue).InstallLocation
              if (-not $installLocation) {
                continue
              }

              $candidate = Join-Path $installLocation 'ISCC.exe'
              if (Test-Path $candidate) {
                return $candidate
              }
            }

            return $null
          }

          $iscc = Resolve-IsccPath
          if (-not $iscc) {
            choco install innosetup --no-progress -y
            $iscc = Resolve-IsccPath
          }

          if (-not $iscc) {
            throw "ISCC.exe was not found after resolving Inno Setup."
          }

          $isccDir = Split-Path $iscc -Parent
          $isccDir >> $env:GITHUB_PATH
          "iscc_path=$iscc" >> $env:GITHUB_OUTPUT
          Write-Host "Using Inno Setup compiler at $iscc"

      - name: Build Windows installer
        shell: pwsh
        continue-on-error: false
        run: |
          $iscc = '${{ steps.innosetup.outputs.iscc_path }}'
          if (-not $iscc) {
            throw "ISCC.exe was not resolved before building the installer."
          }

          $releaseDir = Join-Path $env:BUILD_ROOT $env:APP_NAME
          & $iscc `
            "/DAppVersion=${{ needs.resolve-release.outputs.app_version }}" `
            "/DSourceDir=$releaseDir" `
            "/DRepoRoot=$env:GITHUB_WORKSPACE" `
            "/DOutputDir=$env:RELEASE_ROOT" `
            "/DOutputBaseFilename=${{ steps.names.outputs.installer_base_name }}" `
            "installer\DRB-OCR-AI.iss"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            build-logs
            ${{ runner.temp }}\drb-ocr-ai\logs
          if-no-files-found: warn

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-installer-${{ needs.resolve-release.outputs.release_tag }}
          path: |
            dist\release\${{ steps.names.outputs.installer_name }}
          if-no-files-found: error

      - name: Upload portable archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-zip-${{ needs.resolve-release.outputs.release_tag }}
          path: |
            dist\release\${{ steps.names.outputs.zip_name }}
          if-no-files-found: error

      - name: Notify failure
        if: failure() && env.FAILURE_WEBHOOK_URL != ''
        shell: pwsh
        continue-on-error: false
        run: |
          # TODO: Adjust the JSON payload if your chat system is not Slack-compatible.
          $payload = @{
            text = "GitHub Actions failure: build-package job failed for $env:GITHUB_REPOSITORY on run $env:GITHUB_RUN_ID."
          } | ConvertTo-Json -Compress
          Invoke-RestMethod -Method Post -Uri $env:FAILURE_WEBHOOK_URL -ContentType 'application/json' -Body $payload

  deploy-staging:
    name: Deploy To Staging
    if: always() && needs.resolve-release.result == 'success' && (needs.build-package.result == 'success' || needs.build-package.result == 'skipped')
    needs:
      - resolve-release
      - build-package
    runs-on: windows-latest
    environment:
      name: staging
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN || github.token }}
      VERIFY_ROOT: ${{ github.workspace }}\release-health\staging

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download installer artifact
        if: needs.resolve-release.outputs.deploy_mode == 'release'
        uses: actions/download-artifact@v4
        with:
          name: release-installer-${{ needs.resolve-release.outputs.release_tag }}
          path: release-assets

      - name: Verify GitHub CLI
        shell: pwsh
        continue-on-error: false
        run: |
          gh --version

      - name: Prepare rollback candidate
        if: needs.resolve-release.outputs.deploy_mode == 'rollback'
        shell: pwsh
        continue-on-error: false
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          gh release download '${{ needs.resolve-release.outputs.release_tag }}' --pattern '*.exe' --dir release-assets --clobber

      - name: Prepare publishable staging installer
        shell: pwsh
        continue-on-error: false
        run: |
          $sourceDir = Join-Path $env:GITHUB_WORKSPACE 'release-assets'
          $publishDir = Join-Path $env:GITHUB_WORKSPACE 'release-publish'
          $maxBytes = [int64]$env:GITHUB_RELEASE_ASSET_MAX_BYTES

          if (-not (Test-Path $sourceDir)) {
            throw "Release asset source directory was not found: $sourceDir"
          }

          if (Test-Path $publishDir) {
            Remove-Item $publishDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $publishDir -Force | Out-Null

          $sourceFiles = Get-ChildItem -Path $sourceDir -File | Where-Object { $_.Extension -eq '.exe' }
          if (-not $sourceFiles) {
            throw "No installer asset was found in $sourceDir."
          }

          foreach ($file in $sourceFiles) {
            $sizeMb = [math]::Round($file.Length / 1MB, 2)
            if ($file.Length -gt $maxBytes) {
              Write-Warning "Skipping $($file.Name) because $sizeMb MB exceeds the GitHub Release 2 GiB asset limit."
              continue
            }

            Copy-Item $file.FullName -Destination (Join-Path $publishDir $file.Name) -Force
            Write-Host "Prepared installer $($file.Name) ($sizeMb MB) for GitHub Release upload."
          }

          $publishFiles = Get-ChildItem -Path $publishDir -File
          if (-not $publishFiles) {
            throw "No publishable installer remains after applying the GitHub Release 2 GiB asset limit."
          }

      - name: Publish staging prerelease
        if: needs.resolve-release.outputs.deploy_mode == 'release'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN || github.token }}
          tag_name: ${{ needs.resolve-release.outputs.staging_tag }}
          name: ${{ needs.resolve-release.outputs.release_name }} - Staging
          prerelease: true
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release-publish/*.exe

      - name: Re-publish rollback candidate to staging
        if: needs.resolve-release.outputs.deploy_mode == 'rollback'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN || github.token }}
          tag_name: ${{ needs.resolve-release.outputs.staging_tag }}
          name: ${{ needs.resolve-release.outputs.release_name }} - Rollback Validation
          prerelease: true
          generate_release_notes: false
          files: |
            release-publish/*.exe

      - name: Run post-deploy staging health check
        shell: pwsh
        continue-on-error: false
        env:
          DRB_OCR_AI_SMOKE_TEST: "1"
        run: |
          New-Item -ItemType Directory -Path $env:VERIFY_ROOT -Force | Out-Null
          $downloadDir = Join-Path $env:VERIFY_ROOT 'release-download'
          New-Item -ItemType Directory -Path $downloadDir -Force | Out-Null
          gh release download '${{ needs.resolve-release.outputs.staging_tag }}' --pattern '*.exe' --dir $downloadDir --clobber

          $installerPath = Get-ChildItem -Path $downloadDir -File -Filter '*.exe' | Select-Object -First 1
          if (-not $installerPath) {
            throw "No staging installer artifact was downloaded."
          }

          $installRoot = Join-Path $env:VERIFY_ROOT 'installed'
          if (Test-Path $installRoot) {
            Remove-Item $installRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $installRoot -Force | Out-Null

          $installerProcess = Start-Process `
            -FilePath $installerPath.FullName `
            -ArgumentList @('/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', '/SP-', "/DIR=$installRoot") `
            -Wait `
            -PassThru

          if ($installerProcess.ExitCode -ne 0) {
            throw "Staging installer validation failed with exit code $($installerProcess.ExitCode)."
          }

          $appExe = Get-ChildItem -Path $installRoot -Recurse -Filter "$env:APP_NAME.exe" | Select-Object -First 1
          if (-not $appExe) {
            throw "Installed executable was not found after staging installer validation."
          }

          $stdoutPath = Join-Path $env:VERIFY_ROOT 'staging-smoke.stdout.log'
          $stderrPath = Join-Path $env:VERIFY_ROOT 'staging-smoke.stderr.log'

          $process = Start-Process `
            -FilePath $appExe.FullName `
            -WorkingDirectory $appExe.DirectoryName `
            -NoNewWindow `
            -PassThru `
            -RedirectStandardOutput $stdoutPath `
            -RedirectStandardError $stderrPath

          if (-not $process.WaitForExit(120000)) {
            try { $process.Kill($true) } catch {}
            throw "Staging health check timed out after 120 seconds."
          }

          if ($process.ExitCode -ne 0) {
            if (Test-Path $stdoutPath) { Get-Content $stdoutPath }
            if (Test-Path $stderrPath) { Get-Content $stderrPath }
            throw "Staging health check failed with exit code $($process.ExitCode)."
          }

      - name: Upload staging health logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-health-${{ github.run_id }}
          path: |
            release-health\staging
          if-no-files-found: warn

      - name: Notify failure
        if: failure() && env.FAILURE_WEBHOOK_URL != ''
        shell: pwsh
        continue-on-error: false
        run: |
          # TODO: Adjust the JSON payload if your chat system is not Slack-compatible.
          $payload = @{
            text = "GitHub Actions failure: deploy-staging job failed for $env:GITHUB_REPOSITORY on run $env:GITHUB_RUN_ID."
          } | ConvertTo-Json -Compress
          Invoke-RestMethod -Method Post -Uri $env:FAILURE_WEBHOOK_URL -ContentType 'application/json' -Body $payload

  deploy-production:
    name: Promote To Production
    if: always() && needs.resolve-release.result == 'success' && needs.deploy-staging.result == 'success'
    needs:
      - resolve-release
      - deploy-staging
    runs-on: windows-latest
    environment:
      name: production
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN || github.token }}
      VERIFY_ROOT: ${{ github.workspace }}\release-health\production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download installer artifact
        if: needs.resolve-release.outputs.deploy_mode == 'release'
        uses: actions/download-artifact@v4
        with:
          name: release-installer-${{ needs.resolve-release.outputs.release_tag }}
          path: release-assets

      - name: Prepare publishable production installer
        if: needs.resolve-release.outputs.deploy_mode == 'release'
        shell: pwsh
        continue-on-error: false
        run: |
          $sourceDir = Join-Path $env:GITHUB_WORKSPACE 'release-assets'
          $publishDir = Join-Path $env:GITHUB_WORKSPACE 'release-publish'
          $maxBytes = [int64]$env:GITHUB_RELEASE_ASSET_MAX_BYTES

          if (-not (Test-Path $sourceDir)) {
            throw "Release asset source directory was not found: $sourceDir"
          }

          if (Test-Path $publishDir) {
            Remove-Item $publishDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $publishDir -Force | Out-Null

          $sourceFiles = Get-ChildItem -Path $sourceDir -File | Where-Object { $_.Extension -eq '.exe' }
          if (-not $sourceFiles) {
            throw "No installer asset was found in $sourceDir."
          }

          foreach ($file in $sourceFiles) {
            $sizeMb = [math]::Round($file.Length / 1MB, 2)
            if ($file.Length -gt $maxBytes) {
              Write-Warning "Skipping $($file.Name) because $sizeMb MB exceeds the GitHub Release 2 GiB asset limit."
              continue
            }

            Copy-Item $file.FullName -Destination (Join-Path $publishDir $file.Name) -Force
            Write-Host "Prepared installer $($file.Name) ($sizeMb MB) for GitHub Release upload."
          }

          $publishFiles = Get-ChildItem -Path $publishDir -File
          if (-not $publishFiles) {
            throw "No publishable installer remains after applying the GitHub Release 2 GiB asset limit."
          }

      - name: Promote release to production
        if: needs.resolve-release.outputs.deploy_mode == 'release'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN || github.token }}
          tag_name: ${{ needs.resolve-release.outputs.release_tag }}
          name: ${{ needs.resolve-release.outputs.release_name }}
          prerelease: false
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
          files: |
            release-publish/*.exe

      - name: Re-promote rollback tag as latest
        if: needs.resolve-release.outputs.deploy_mode == 'rollback'
        shell: pwsh
        continue-on-error: false
        run: |
          gh release edit '${{ needs.resolve-release.outputs.release_tag }}' --latest

      - name: Run post-deploy production health check
        shell: pwsh
        continue-on-error: false
        env:
          DRB_OCR_AI_SMOKE_TEST: "1"
        run: |
          New-Item -ItemType Directory -Path $env:VERIFY_ROOT -Force | Out-Null
          $downloadDir = Join-Path $env:VERIFY_ROOT 'release-download'
          New-Item -ItemType Directory -Path $downloadDir -Force | Out-Null
          gh release download '${{ needs.resolve-release.outputs.release_tag }}' --pattern '*.exe' --dir $downloadDir --clobber

          $installerPath = Get-ChildItem -Path $downloadDir -File -Filter '*.exe' | Select-Object -First 1
          if (-not $installerPath) {
            throw "No production installer artifact was downloaded."
          }

          $installRoot = Join-Path $env:VERIFY_ROOT 'installed'
          if (Test-Path $installRoot) {
            Remove-Item $installRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $installRoot -Force | Out-Null

          $installerProcess = Start-Process `
            -FilePath $installerPath.FullName `
            -ArgumentList @('/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', '/SP-', "/DIR=$installRoot") `
            -Wait `
            -PassThru

          if ($installerProcess.ExitCode -ne 0) {
            throw "Production installer validation failed with exit code $($installerProcess.ExitCode)."
          }

          $appExe = Get-ChildItem -Path $installRoot -Recurse -Filter "$env:APP_NAME.exe" | Select-Object -First 1
          if (-not $appExe) {
            throw "Installed executable was not found after production installer validation."
          }

          $stdoutPath = Join-Path $env:VERIFY_ROOT 'production-smoke.stdout.log'
          $stderrPath = Join-Path $env:VERIFY_ROOT 'production-smoke.stderr.log'

          $process = Start-Process `
            -FilePath $appExe.FullName `
            -WorkingDirectory $appExe.DirectoryName `
            -NoNewWindow `
            -PassThru `
            -RedirectStandardOutput $stdoutPath `
            -RedirectStandardError $stderrPath

          if (-not $process.WaitForExit(120000)) {
            try { $process.Kill($true) } catch {}
            throw "Production health check timed out after 120 seconds."
          }

          if ($process.ExitCode -ne 0) {
            if (Test-Path $stdoutPath) { Get-Content $stdoutPath }
            if (Test-Path $stderrPath) { Get-Content $stderrPath }
            throw "Production health check failed with exit code $($process.ExitCode)."
          }

      - name: Upload production health logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-health-${{ github.run_id }}
          path: |
            release-health\production
          if-no-files-found: warn

      - name: Notify failure
        if: failure() && env.FAILURE_WEBHOOK_URL != ''
        shell: pwsh
        continue-on-error: false
        run: |
          # TODO: Adjust the JSON payload if your chat system is not Slack-compatible.
          $payload = @{
            text = "GitHub Actions failure: deploy-production job failed for $env:GITHUB_REPOSITORY on run $env:GITHUB_RUN_ID."
          } | ConvertTo-Json -Compress
          Invoke-RestMethod -Method Post -Uri $env:FAILURE_WEBHOOK_URL -ContentType 'application/json' -Body $payload
