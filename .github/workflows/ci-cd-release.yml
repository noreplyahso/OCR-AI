# Required GitHub secrets:
#   GH_RELEASE_TOKEN
#     Personal access token with `contents:write` to create, edit, download, and promote releases.
#   FAILURE_WEBHOOK_URL
#     Optional Slack-compatible webhook URL used by `if: failure()` notification steps.
#
# Required GitHub environments:
#   staging
#     Used for prerelease publication.
#   production
#     Configure required reviewers here to create the manual approval gate before production promotion.
# TODO: Add required reviewers to the `production` environment in GitHub settings.
#
# Deployment model:
#   Rolling promotion with immutable artifacts.
#   The workflow validates the exact build on staging first, then promotes the same ZIP and installer to production.
#   The previous stable release remains available until the production health check succeeds.
#
# Manual rollback strategy:
#   Run this workflow manually with `rollback_tag` set to a previously validated production tag such as `v1.2.2`.
#   The workflow will re-promote that existing release as `latest` without rebuilding artifacts.

name: ci-cd-release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Semver tag to build and deploy, for example v1.2.3"
        required: false
        type: string
      rollback_tag:
        description: "Existing stable release tag to re-promote, for example v1.2.2"
        required: false
        type: string

permissions:
  contents: write

env:
  APP_NAME: DRB-OCR-AI
  PYTHON_VERSION: "3.9"
  PYTHONUTF8: "1"
  PIP_EXTRA_INDEX_URL: "https://download.pytorch.org/whl/cu117"
  FAILURE_WEBHOOK_URL: ${{ secrets.FAILURE_WEBHOOK_URL }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-release:
    name: Resolve Release Metadata
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 10
    outputs:
      deploy_mode: ${{ steps.resolve.outputs.deploy_mode }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_name: ${{ steps.resolve.outputs.release_name }}
      staging_tag: ${{ steps.resolve.outputs.staging_tag }}
      app_version: ${{ steps.resolve.outputs.app_version }}

    steps:
      - name: Resolve release mode and tags
        id: resolve
        shell: pwsh
        continue-on-error: false
        run: |
          $eventName = '${{ github.event_name }}'
          $releaseVersion = '${{ github.event.inputs.release_version }}'
          $rollbackTag = '${{ github.event.inputs.rollback_tag }}'

          if ($eventName -eq 'push' -and '${{ github.ref_type }}' -eq 'tag') {
            $deployMode = 'release'
            $releaseTag = '${{ github.ref_name }}'
          } elseif ($eventName -eq 'workflow_dispatch' -and -not [string]::IsNullOrWhiteSpace($rollbackTag)) {
            $deployMode = 'rollback'
            $releaseTag = $rollbackTag
          } elseif ($eventName -eq 'workflow_dispatch' -and -not [string]::IsNullOrWhiteSpace($releaseVersion)) {
            $deployMode = 'release'
            $releaseTag = $releaseVersion
          } else {
            throw "Provide `release_version` for a normal deployment or `rollback_tag` for rollback."
          }

          if ($releaseTag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must follow semver format, for example v1.2.3."
          }

          $releaseName = "${env:APP_NAME} $releaseTag"
          $stagingTag = "staging-$releaseTag"
          $appVersion = $releaseTag.TrimStart('v')

          "deploy_mode=$deployMode" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "staging_tag=$stagingTag" >> $env:GITHUB_OUTPUT
          "app_version=$appVersion" >> $env:GITHUB_OUTPUT

      - name: Notify failure
        if: failure() && env.FAILURE_WEBHOOK_URL != ''
        shell: pwsh
        continue-on-error: false
        run: |
          # TODO: Adjust the JSON payload if your chat system is not Slack-compatible.
          $payload = @{
            text = "GitHub Actions failure: resolve-release job failed for $env:GITHUB_REPOSITORY on run $env:GITHUB_RUN_ID."
          } | ConvertTo-Json -Compress
          Invoke-RestMethod -Method Post -Uri $env:FAILURE_WEBHOOK_URL -ContentType 'application/json' -Body $payload

  lint-and-test:
    name: Lint And Unit Test
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.rollback_tag == ''
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: ${{ github.workspace }};${{ github.workspace }}\lib

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt

      - name: Install dev dependencies
        shell: pwsh
        continue-on-error: false
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements-dev.txt

      - name: Run flake8 lint
        shell: pwsh
        continue-on-error: false
        run: |
          flake8 main.py lib\AppLogger.py tests

      - name: Run unit tests with coverage
        shell: pwsh
        continue-on-error: false
        run: |
          New-Item -ItemType Directory -Path test-results -Force | Out-Null
          pytest tests `
            --maxfail=1 `
            --disable-warnings `
            --junitxml=test-results\junit.xml `
            --cov=AppLogger `
            --cov-report=xml:test-results\coverage.xml `
            --cov-report=html:test-results\htmlcov

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: |
            test-results
          if-no-files-found: warn

      - name: Notify failure
        if: failure() && env.FAILURE_WEBHOOK_URL != ''
        shell: pwsh
        continue-on-error: false
        run: |
          # TODO: Adjust the JSON payload if your chat system is not Slack-compatible.
          $payload = @{
            text = "GitHub Actions failure: lint-and-test job failed for $env:GITHUB_REPOSITORY on run $env:GITHUB_RUN_ID."
          } | ConvertTo-Json -Compress
          Invoke-RestMethod -Method Post -Uri $env:FAILURE_WEBHOOK_URL -ContentType 'application/json' -Body $payload

  build-package:
    name: Build Windows Package
    if: needs.resolve-release.outputs.deploy_mode == 'release'
    needs:
      - resolve-release
      - lint-and-test
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      BUILD_ROOT: ${{ github.workspace }}\dist
      RELEASE_ROOT: ${{ github.workspace }}\dist\release
      LOCAL_SMOKE_LOG_DIR: ${{ github.workspace }}\build-logs

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt

      - name: Install production and build dependencies
        shell: pwsh
        continue-on-error: false
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --extra-index-url $env:PIP_EXTRA_INDEX_URL -r requirements.txt
          python -m pip install --prefer-binary --extra-index-url $env:PIP_EXTRA_INDEX_URL `
            torch==2.0.1+cu117 `
            torchvision==0.15.2+cu117 `
            torchaudio==2.0.2+cu117
          python -m pip install `
            pyinstaller==6.16.0 `
            pyinstaller-hooks-contrib==2025.8 `
            pymcprotocol==0.3.0 `
            pywin32==311
          python -m pip show torch torchvision torchaudio
          python -c "import torch, torchvision, torchaudio, ultralytics, yaml, psutil, PyInstaller; print(torch.__version__)"

      - name: Resolve release file names
        id: names
        shell: pwsh
        continue-on-error: false
        run: |
          $releaseTag = '${{ needs.resolve-release.outputs.release_tag }}'
          $zipName = "$env:APP_NAME-$releaseTag-windows-x64.zip"
          $installerName = "$env:APP_NAME-$releaseTag-setup-x64.exe"
          $installerBaseName = [System.IO.Path]::GetFileNameWithoutExtension($installerName)
          "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          "installer_name=$installerName" >> $env:GITHUB_OUTPUT
          "installer_base_name=$installerBaseName" >> $env:GITHUB_OUTPUT

      - name: Build PyInstaller bundle
        shell: pwsh
        continue-on-error: false
        run: |
          if (Test-Path build) {
            Remove-Item build -Recurse -Force
          }
          if (Test-Path dist) {
            Remove-Item dist -Recurse -Force
          }
          pyinstaller --clean --noconfirm main.spec

      - name: Copy runtime assets
        shell: pwsh
        continue-on-error: false
        run: |
          $releaseDir = Join-Path $env:BUILD_ROOT $env:APP_NAME
          $runtimeDirs = @('form_UI', 'Icon', 'RunTime_Sofware', 'module')

          New-Item -ItemType Directory -Path $env:RELEASE_ROOT -Force | Out-Null

          foreach ($dir in $runtimeDirs) {
            if (Test-Path $dir) {
              Copy-Item $dir -Destination $releaseDir -Recurse -Force
            }
          }

          $libTarget = Join-Path $releaseDir 'lib'
          New-Item -ItemType Directory -Path $libTarget -Force | Out-Null

          Get-ChildItem lib -File |
            Where-Object { $_.Extension -in '.py', '.dll', '.txt' -and $_.Name -ne 'setup.py' } |
            Copy-Item -Destination $libTarget -Force

          Get-ChildItem -File -Filter '*.pt' |
            Copy-Item -Destination $releaseDir -Force

          foreach ($file in @('README.md', 'DRB_Metalcore_text.sql', 'DRB product text.xlsx')) {
            if (Test-Path $file) {
              Copy-Item $file -Destination $releaseDir -Force
            }
          }

      - name: Run pre-deploy smoke test
        shell: pwsh
        continue-on-error: false
        env:
          DRB_OCR_AI_SMOKE_TEST: "1"
        run: |
          $releaseDir = Join-Path $env:BUILD_ROOT $env:APP_NAME
          $exePath = Join-Path $releaseDir "$env:APP_NAME.exe"
          $stdoutPath = Join-Path $env:LOCAL_SMOKE_LOG_DIR 'build-smoke.stdout.log'
          $stderrPath = Join-Path $env:LOCAL_SMOKE_LOG_DIR 'build-smoke.stderr.log'

          New-Item -ItemType Directory -Path $env:LOCAL_SMOKE_LOG_DIR -Force | Out-Null
          if (Test-Path $stdoutPath) { Remove-Item $stdoutPath -Force }
          if (Test-Path $stderrPath) { Remove-Item $stderrPath -Force }

          $process = Start-Process `
            -FilePath $exePath `
            -WorkingDirectory $releaseDir `
            -NoNewWindow `
            -PassThru `
            -RedirectStandardOutput $stdoutPath `
            -RedirectStandardError $stderrPath

          if (-not $process.WaitForExit(120000)) {
            try { $process.Kill($true) } catch {}
            throw "Smoke test timed out after 120 seconds."
          }

          if ($process.ExitCode -ne 0) {
            if (Test-Path $stdoutPath) { Get-Content $stdoutPath }
            if (Test-Path $stderrPath) { Get-Content $stderrPath }
            throw "Smoke test failed with exit code $($process.ExitCode)."
          }

      - name: Build portable archive
        shell: pwsh
        continue-on-error: false
        run: |
          $releaseDir = Join-Path $env:BUILD_ROOT $env:APP_NAME
          $zipPath = Join-Path $env:RELEASE_ROOT '${{ steps.names.outputs.zip_name }}'
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path $releaseDir -DestinationPath $zipPath -Force

      - name: Install Inno Setup
        shell: pwsh
        continue-on-error: false
        run: |
          choco install innosetup --version=6.4.3 --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        continue-on-error: false
        run: |
          $isccCandidates = @(
            "$env:ProgramFiles(x86)\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          )
          $iscc = $isccCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            throw "ISCC.exe was not found after installing Inno Setup."
          }

          $releaseDir = Join-Path $env:BUILD_ROOT $env:APP_NAME
          & $iscc `
            "/DAppVersion=${{ needs.resolve-release.outputs.app_version }}" `
            "/DSourceDir=$releaseDir" `
            "/DRepoRoot=$env:GITHUB_WORKSPACE" `
            "/DOutputDir=$env:RELEASE_ROOT" `
            "/DOutputBaseFilename=${{ steps.names.outputs.installer_base_name }}" `
            "installer\DRB-OCR-AI.iss"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            build-logs
            ${{ runner.temp }}\drb-ocr-ai\logs
          if-no-files-found: warn

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ needs.resolve-release.outputs.release_tag }}
          path: |
            dist\release\${{ steps.names.outputs.zip_name }}
            dist\release\${{ steps.names.outputs.installer_name }}
          if-no-files-found: error

      - name: Notify failure
        if: failure() && env.FAILURE_WEBHOOK_URL != ''
        shell: pwsh
        continue-on-error: false
        run: |
          # TODO: Adjust the JSON payload if your chat system is not Slack-compatible.
          $payload = @{
            text = "GitHub Actions failure: build-package job failed for $env:GITHUB_REPOSITORY on run $env:GITHUB_RUN_ID."
          } | ConvertTo-Json -Compress
          Invoke-RestMethod -Method Post -Uri $env:FAILURE_WEBHOOK_URL -ContentType 'application/json' -Body $payload

  deploy-staging:
    name: Deploy To Staging
    if: always() && needs.resolve-release.result == 'success' && (needs.build-package.result == 'success' || needs.build-package.result == 'skipped')
    needs:
      - resolve-release
      - build-package
    runs-on: windows-latest
    environment:
      name: staging
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
      VERIFY_ROOT: ${{ github.workspace }}\release-health\staging

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download build artifacts
        if: needs.resolve-release.outputs.deploy_mode == 'release'
        uses: actions/download-artifact@v4
        with:
          name: release-assets-${{ needs.resolve-release.outputs.release_tag }}
          path: release-assets

      - name: Verify GitHub CLI
        shell: pwsh
        continue-on-error: false
        run: |
          gh --version

      - name: Publish staging prerelease
        if: needs.resolve-release.outputs.deploy_mode == 'release'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN }}
          tag_name: ${{ needs.resolve-release.outputs.staging_tag }}
          name: ${{ needs.resolve-release.outputs.release_name }} - Staging
          prerelease: true
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release-assets/*.zip
            release-assets/*.exe

      - name: Prepare rollback candidate
        if: needs.resolve-release.outputs.deploy_mode == 'rollback'
        shell: pwsh
        continue-on-error: false
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          gh release download '${{ needs.resolve-release.outputs.release_tag }}' --pattern '*.zip' --pattern '*.exe' --dir release-assets --clobber

      - name: Re-publish rollback candidate to staging
        if: needs.resolve-release.outputs.deploy_mode == 'rollback'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN }}
          tag_name: ${{ needs.resolve-release.outputs.staging_tag }}
          name: ${{ needs.resolve-release.outputs.release_name }} - Rollback Validation
          prerelease: true
          generate_release_notes: false
          files: |
            release-assets/*.zip
            release-assets/*.exe

      - name: Run post-deploy staging health check
        shell: pwsh
        continue-on-error: false
        env:
          DRB_OCR_AI_SMOKE_TEST: "1"
        run: |
          New-Item -ItemType Directory -Path $env:VERIFY_ROOT -Force | Out-Null
          gh release download '${{ needs.resolve-release.outputs.staging_tag }}' --pattern '*.zip' --dir $env:VERIFY_ROOT --clobber

          $zipPath = Get-ChildItem -Path $env:VERIFY_ROOT -Filter '*.zip' | Select-Object -First 1
          if (-not $zipPath) {
            throw "No staging ZIP artifact was downloaded."
          }

          $portableRoot = Join-Path $env:VERIFY_ROOT 'portable'
          Expand-Archive -Path $zipPath.FullName -DestinationPath $portableRoot -Force

          $exePath = Get-ChildItem -Path $portableRoot -Recurse -Filter "$env:APP_NAME.exe" | Select-Object -First 1
          if (-not $exePath) {
            throw "Packaged executable was not found in staging artifact."
          }

          $stdoutPath = Join-Path $env:VERIFY_ROOT 'staging-smoke.stdout.log'
          $stderrPath = Join-Path $env:VERIFY_ROOT 'staging-smoke.stderr.log'

          $process = Start-Process `
            -FilePath $exePath.FullName `
            -WorkingDirectory $exePath.DirectoryName `
            -NoNewWindow `
            -PassThru `
            -RedirectStandardOutput $stdoutPath `
            -RedirectStandardError $stderrPath

          if (-not $process.WaitForExit(120000)) {
            try { $process.Kill($true) } catch {}
            throw "Staging health check timed out after 120 seconds."
          }

          if ($process.ExitCode -ne 0) {
            if (Test-Path $stdoutPath) { Get-Content $stdoutPath }
            if (Test-Path $stderrPath) { Get-Content $stderrPath }
            throw "Staging health check failed with exit code $($process.ExitCode)."
          }

      - name: Upload staging health logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-health-${{ github.run_id }}
          path: |
            release-health\staging
          if-no-files-found: warn

      - name: Notify failure
        if: failure() && env.FAILURE_WEBHOOK_URL != ''
        shell: pwsh
        continue-on-error: false
        run: |
          # TODO: Adjust the JSON payload if your chat system is not Slack-compatible.
          $payload = @{
            text = "GitHub Actions failure: deploy-staging job failed for $env:GITHUB_REPOSITORY on run $env:GITHUB_RUN_ID."
          } | ConvertTo-Json -Compress
          Invoke-RestMethod -Method Post -Uri $env:FAILURE_WEBHOOK_URL -ContentType 'application/json' -Body $payload

  deploy-production:
    name: Promote To Production
    if: always() && needs.resolve-release.result == 'success' && needs.deploy-staging.result == 'success'
    needs:
      - resolve-release
      - deploy-staging
    runs-on: windows-latest
    environment:
      name: production
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
      VERIFY_ROOT: ${{ github.workspace }}\release-health\production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download build artifacts
        if: needs.resolve-release.outputs.deploy_mode == 'release'
        uses: actions/download-artifact@v4
        with:
          name: release-assets-${{ needs.resolve-release.outputs.release_tag }}
          path: release-assets

      - name: Promote release to production
        if: needs.resolve-release.outputs.deploy_mode == 'release'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN }}
          tag_name: ${{ needs.resolve-release.outputs.release_tag }}
          name: ${{ needs.resolve-release.outputs.release_name }}
          prerelease: false
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
          files: |
            release-assets/*.zip
            release-assets/*.exe

      - name: Re-promote rollback tag as latest
        if: needs.resolve-release.outputs.deploy_mode == 'rollback'
        shell: pwsh
        continue-on-error: false
        run: |
          gh release edit '${{ needs.resolve-release.outputs.release_tag }}' --latest

      - name: Run post-deploy production health check
        shell: pwsh
        continue-on-error: false
        env:
          DRB_OCR_AI_SMOKE_TEST: "1"
        run: |
          New-Item -ItemType Directory -Path $env:VERIFY_ROOT -Force | Out-Null
          gh release download '${{ needs.resolve-release.outputs.release_tag }}' --pattern '*.zip' --dir $env:VERIFY_ROOT --clobber

          $zipPath = Get-ChildItem -Path $env:VERIFY_ROOT -Filter '*.zip' | Select-Object -First 1
          if (-not $zipPath) {
            throw "No production ZIP artifact was downloaded."
          }

          $portableRoot = Join-Path $env:VERIFY_ROOT 'portable'
          Expand-Archive -Path $zipPath.FullName -DestinationPath $portableRoot -Force

          $exePath = Get-ChildItem -Path $portableRoot -Recurse -Filter "$env:APP_NAME.exe" | Select-Object -First 1
          if (-not $exePath) {
            throw "Packaged executable was not found in production artifact."
          }

          $stdoutPath = Join-Path $env:VERIFY_ROOT 'production-smoke.stdout.log'
          $stderrPath = Join-Path $env:VERIFY_ROOT 'production-smoke.stderr.log'

          $process = Start-Process `
            -FilePath $exePath.FullName `
            -WorkingDirectory $exePath.DirectoryName `
            -NoNewWindow `
            -PassThru `
            -RedirectStandardOutput $stdoutPath `
            -RedirectStandardError $stderrPath

          if (-not $process.WaitForExit(120000)) {
            try { $process.Kill($true) } catch {}
            throw "Production health check timed out after 120 seconds."
          }

          if ($process.ExitCode -ne 0) {
            if (Test-Path $stdoutPath) { Get-Content $stdoutPath }
            if (Test-Path $stderrPath) { Get-Content $stderrPath }
            throw "Production health check failed with exit code $($process.ExitCode)."
          }

      - name: Upload production health logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-health-${{ github.run_id }}
          path: |
            release-health\production
          if-no-files-found: warn

      - name: Notify failure
        if: failure() && env.FAILURE_WEBHOOK_URL != ''
        shell: pwsh
        continue-on-error: false
        run: |
          # TODO: Adjust the JSON payload if your chat system is not Slack-compatible.
          $payload = @{
            text = "GitHub Actions failure: deploy-production job failed for $env:GITHUB_REPOSITORY on run $env:GITHUB_RUN_ID."
          } | ConvertTo-Json -Compress
          Invoke-RestMethod -Method Post -Uri $env:FAILURE_WEBHOOK_URL -ContentType 'application/json' -Body $payload
